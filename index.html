<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nudge — meet real people nearby</title>
  <meta name="description" content="A safe, warm, effortless way to meet real people nearby. Coming soon."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cobalt:       #2B5CE6;
      --cobalt-soft:  #6B96F5;
      --cobalt-tint:  #EDF0FA;
      --bg:           #F6F8FF;
      --charcoal:     #2D2D3A;
      --amber:        #F5A623;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--charcoal);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    .orb-1 { width: 480px; height: 480px; background: var(--cobalt); top: -120px; right: -100px; animation: drift 12s ease-in-out infinite alternate; }
    .orb-2 { width: 320px; height: 320px; background: var(--amber); bottom: -80px; left: -60px; animation: drift 16s ease-in-out infinite alternate-reverse; }
    .orb-3 { width: 200px; height: 200px; background: var(--cobalt-soft); top: 40%; left: 10%; animation: drift 10s ease-in-out infinite alternate; }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(30px, 20px); }
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo-wrap {
      margin-bottom: 40px;
      animation: fadeUp 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .logo-wrap svg {
      width: 190px;
      height: auto;
      /* Strip the background rect — page bg handles it */
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--cobalt-tint);
      color: var(--cobalt);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 28px;
      animation: fadeUp 0.7s 0s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .headline {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      color: var(--charcoal);
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      animation: fadeUp 0.7s 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .headline em { font-style: normal; color: var(--cobalt); }

    .subline {
      font-size: 16px;
      font-weight: 400;
      color: var(--charcoal);
      opacity: 0.55;
      line-height: 1.6;
      margin-bottom: 48px;
      animation: fadeUp 0.7s 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .form-wrap { width: 100%; animation: fadeUp 0.7s 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
    .form { display: flex; gap: 10px; width: 100%; }
    .input {
      flex: 1;
      height: 52px;
      padding: 0 18px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      color: var(--charcoal);
      background: #fff;
      border: 1.5px solid #DDE3F5;
      border-radius: 14px;
      outline: none;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .input::placeholder { color: #A0AABF; }
    .input:focus { border-color: var(--cobalt); box-shadow: 0 0 0 3px rgba(43,92,230,0.12); }
    .btn {
      height: 52px;
      padding: 0 24px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      background: var(--cobalt);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 120ms ease, background 200ms ease;
    }
    .btn:hover { background: #2350d0; }
    .btn:active { transform: scale(0.97); }

    .success {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--cobalt-tint);
      color: var(--cobalt);
      font-size: 15px;
      font-weight: 500;
      padding: 14px 20px;
      border-radius: 14px;
      width: 100%;
    }
    .success.show { display: flex; animation: fadeUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
    .success-icon {
      width: 20px; height: 20px;
      background: var(--cobalt);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--charcoal);
      opacity: 0.35;
      animation: fadeUp 0.7s 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .footer {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.7s 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .footer-email {
      font-size: 13px;
      color: var(--charcoal);
      opacity: 0.45;
      text-decoration: none;
      transition: opacity 200ms ease;
    }
    .footer-email:hover { opacity: 0.75; }
    .footer-links {
      display: flex;
      gap: 18px;
    }
    .footer-link {
      font-size: 12px;
      color: var(--cobalt);
      opacity: 0.6;
      text-decoration: none;
      transition: opacity 200ms ease;
    }
    .footer-link:hover { opacity: 1; }

    .pins { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .pin { position: absolute; opacity: 0; animation: pinAppear 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    .pin-1  { top: 12%; left: 8%;   animation-delay: 0.8s; }
    .pin-2  { top: 18%; right: 12%; animation-delay: 1.1s; }
    .pin-3  { top: 62%; left: 5%;   animation-delay: 1.4s; }
    .pin-4  { top: 70%; right: 8%;  animation-delay: 1.0s; }
    .pin-5  { top: 38%; left: 3%;   animation-delay: 1.6s; }
    .pin-6  { top: 45%; right: 4%;  animation-delay: 1.2s; }
    @keyframes pinAppear {
      from { opacity: 0; transform: scale(0) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .form { flex-direction: column; }
      .btn  { border-radius: 14px; }
      .pin-1, .pin-3, .pin-5 { display: none; }
    }
  </style>
</head>

    <h1 class="headline">Meet <em>real</em> people<br/>nearby.</h1>
    <p class="subline">A safe, warm way to connect with verified people around you — whatever happens from there is up to you.</p>

    <div class="form-wrap">
      <div class="form" id="form">
        <input class="input" type="email" id="email" placeholder="Your email address" autocomplete="email"/>
        <button class="btn" onclick="handleSubmit()">Notify me</button>
      </div>
      <div class="success" id="success">
        <div class="success-icon">
          <svg viewBox="0 0 11 9" fill="none" width="11" height="9"><path d="M1 4.5L4 7.5L10 1.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        You're on the list — we'll be in touch.
      </div>
    </div>

    <p class="note">No spam, ever. Just a nudge when we're ready.</p>

    <div class="footer">
      <a class="footer-email" href="mailto:team@nudgeme.live">team@nudgeme.live</a>
      <div class="footer-links">
        <a class="footer-link" href="/privacy">Privacy Policy</a>
        <a class="footer-link" href="/terms">Terms of Service</a>
      </div>
    </div>

  </div>
</div>

<script>
  const API_URL = 'https://api.nudgeme.live/api/regions/waitlist';

  async function submitWaitlist(email, latitude, longitude) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, latitude, longitude })
    });
    if (!res.ok) throw new Error('API error ' + res.status);
  }

  function getLocation() {
    return new Promise(resolve => {
      if (!navigator.geolocation) return resolve({ latitude: null, longitude: null });
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
        ()  => resolve({ latitude: null, longitude: null }),
        { timeout: 5000 }
      );
    });
  }

  async function handleSubmit() {
    const input = document.getElementById('email');
    const email = input.value.trim();

    if (!email || !email.includes('@')) {
      input.focus();
      input.style.borderColor = '#E55';
      setTimeout(() => input.style.borderColor = '', 1000);
      return;
    }

    const btn = document.querySelector('.btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const { latitude, longitude } = await getLocation();
      await submitWaitlist(email, latitude, longitude);
      document.getElementById('form').style.display = 'none';
      document.getElementById('success').classList.add('show');
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Notify me';
      input.style.borderColor = '#E55';
      setTimeout(() => input.style.borderColor = '', 1500);
    }
  }

  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
